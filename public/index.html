<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mock Lex Connect Chatbot</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="chat-panel" aria-label="Chatbot">
        <header class="chat-header">
          <div>
            <p class="eyebrow">Mock Amazon Lex V2</p>
            <h1>Connect Support Bot</h1>
          </div>
          <div class="session-pill">
            <span>Session</span>
            <strong id="sessionIdLabel">demo-1</strong>
          </div>
        </header>

        <div class="quick-actions" aria-label="Sample messages">
          <button type="button" data-message="hello">Greeting</button>
          <button type="button" data-message="track my order ORD12345">Order Status</button>
          <button type="button" data-message="my item arrived damaged for order ORD12345">Complaint</button>
          <button type="button" data-message="I want to talk to a human agent">Agent</button>
          <button type="button" data-message="random unknown text">Fallback</button>
        </div>

        <div id="messages" class="messages" aria-live="polite"></div>

        <form id="chatForm" class="composer">
          <input
            id="messageInput"
            name="message"
            type="text"
            autocomplete="off"
            placeholder="Type a message..."
            required
          />
          <button type="submit">Send</button>
        </form>
      </section>

      <aside class="details-panel" aria-label="Bot response details">
        <div class="details-card">
          <h2>Intent</h2>
          <p id="intentName">None yet</p>
        </div>

        <div class="details-card">
          <h2>Connect Action</h2>
          <p id="connectAction">None yet</p>
        </div>

        <div class="details-card">
          <h2>Slots</h2>
          <pre id="slotsOutput">{}</pre>
        </div>

        <div class="details-card">
          <h2>Session State</h2>
          <pre id="sessionStateOutput">{}</pre>
        </div>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
